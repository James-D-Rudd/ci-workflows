name: SonarQube Analysis

on:
  workflow_call:

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: "pip install poetry==2.4.1 --only-binary :all:"

      - name: Install dependencies
        env:
          POETRY_INSTALLER_ONLY_BINARY: ":all:"
        run: poetry install --with test

      - name: Run tests with coverage
        run: poetry run pytest --cov=. --cov-report=xml --junitxml=pytest-report.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.xunit.reportPath=pytest-report.xml
