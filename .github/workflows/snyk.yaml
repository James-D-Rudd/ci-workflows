name: Snyk Security Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Setup Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: "pip install poetry==2.4.1 --only-binary :all:"

      - name: Install dependencies
        env:
          POETRY_INSTALLER_ONLY_BINARY: ":all:"
        run: poetry install --no-interaction --no-ansi

      - name: Install Snyk CLI
        run: npm install -g snyk@1.1297.3 --ignore-scripts --no-fund --no-audit

      - name: Run Snyk test (generate SARIF)
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4.37.0
        with:
          sarif_file: snyk.sarif
